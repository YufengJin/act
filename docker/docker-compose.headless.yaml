services:
  act:
    container_name: act_container
    image: ${IMAGE:-yufengjin/act:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    volumes:
      - ../:/workspace
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - GPU=${GPU:-all}
      - NVIDIA_VISIBLE_DEVICES=${GPU:-all}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=osmesa
      - PYOPENGL_PLATFORM=osmesa
    ulimits:
      memlock: -1
    command: tail -f /dev/null
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
